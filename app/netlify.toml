[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Scheduled inbox poller — every 5 minutes (FR-06 / FR-11)
[functions."inbox-poll"]
  schedule = "*/5 * * * *"

# Daily 24h interview reminder — runs every 15 minutes for granularity
[functions."interview-reminder"]
  schedule = "*/15 * * * *"

# Scoring queue drain — backstop for the upload-time fire-and-forget dispatch.
# Netlify Function shim at netlify/functions/scoring-drain.ts fetches /api/scoring/drain.
[functions."scoring-drain"]
  schedule = "*/5 * * * *"

# Outbound email queue drain (G6) — sends queued email_messages via MS Graph.
# Shim at netlify/functions/email-drain.ts fetches /api/emails/drain.
[functions."email-drain"]
  schedule = "*/5 * * * *"

[[redirects]]
  from = "/"
  to = "/tong-quan"
  status = 302
  conditions = { Role = ["user"] }

[context.production]
  environment = { NEXT_PUBLIC_APP_URL = "https://hr.matviet.com.vn" }

[context.deploy-preview]
  environment = { NEXT_PUBLIC_APP_URL = "https://deploy-preview.matviet-hr.netlify.app" }
