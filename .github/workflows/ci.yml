name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  app:
    name: typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      # Build-time placeholders. Real values live in Cloudflare Worker secrets
      # (wrangler secret put) in production and .dev.vars in dev.
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_NAME: "Mắt Việt HR"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
