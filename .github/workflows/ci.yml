name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  app:
    name: typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      # Build-time placeholders. Real values come from Netlify env in production
      # and from .env.local in dev. The CI build only needs them to be present strings.
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_NAME: "Mắt Việt HR"
      NEXT_PUBLIC_SUPABASE_URL: https://xeyqbapegqeibeqrwnkm.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
